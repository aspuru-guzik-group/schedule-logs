services:
  schedule:
    build: .
    expose:
      - "8501"
    volumes:
      - ./secrets:/app/secrets:ro
    restart: unless-stopped

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    ports:
      - "3000:4180"
    environment:
      # Slack OAuth
      OAUTH2_PROXY_PROVIDER: slack
      OAUTH2_PROXY_CLIENT_ID: "2544853610.10654720685479"
      OAUTH2_PROXY_CLIENT_SECRET: "4ca29b05d74d582ed14e36bc22fbbb91"
      OAUTH2_PROXY_COOKIE_SECRET: "Ll49MoLeOtHugtLo0gbEW4imSfUJl6slkuP6D9MI23k="
      OAUTH2_PROXY_COOKIE_SECURE: "true"
      OAUTH2_PROXY_COOKIE_NAME: "_schedule_auth"

      # Restrict to your Slack workspace (REPLACE with your Team ID)
      OAUTH2_PROXY_SLACK_TEAM: "REPLACE_WITH_TEAM_ID"

      # Allow all emails in the workspace (team restriction is enough)
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"

      # Upstream = the Streamlit app
      OAUTH2_PROXY_UPSTREAMS: "http://schedule:8501/"
      OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:4180"

      # Pass WebSocket headers
      OAUTH2_PROXY_PASS_HOST_HEADER: "true"
      OAUTH2_PROXY_PROXY_WEBSOCKETS: "true"

      # Redirect URL
      OAUTH2_PROXY_REDIRECT_URL: "https://schedule.matter.toronto.edu/oauth2/callback"

      # Don't show the oauth2-proxy sign-in page, go straight to Slack
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
    depends_on:
      - schedule
    restart: unless-stopped
