services:
  schedule:
    build: .
    expose:
      - "8501"
    volumes:
      - ./secrets:/app/secrets:ro
    restart: unless-stopped

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    ports:
      - "3000:4180"
    environment:
      # Slack via OIDC
      OAUTH2_PROXY_PROVIDER: oidc
      OAUTH2_PROXY_PROVIDER_DISPLAY_NAME: Slack
      OAUTH2_PROXY_CLIENT_ID: "2544853610.10654720685479"
      OAUTH2_PROXY_CLIENT_SECRET: "4ca29b05d74d582ed14e36bc22fbbb91"
      OAUTH2_PROXY_COOKIE_SECRET: "Ll49MoLeOtHugtLo0gbEW4imSfUJl6slkuP6D9MI23k="
      OAUTH2_PROXY_COOKIE_SECURE: "true"
      OAUTH2_PROXY_COOKIE_NAME: "_schedule_auth"

      # Slack OIDC endpoints
      OAUTH2_PROXY_OIDC_ISSUER_URL: "https://slack.com"
      OAUTH2_PROXY_LOGIN_URL: "https://slack.com/openid/connect/authorize"
      OAUTH2_PROXY_REDEEM_URL: "https://slack.com/api/openid.connect.token"
      OAUTH2_PROXY_OIDC_JWKS_URL: "https://slack.com/openid/connect/keys"
      OAUTH2_PROXY_SCOPE: "openid email profile"

      # Allow all emails (workspace restriction via Slack app install)
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"

      # Upstream = the Streamlit app
      OAUTH2_PROXY_UPSTREAMS: "http://schedule:8501/"
      OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:4180"

      # WebSocket support
      OAUTH2_PROXY_PASS_HOST_HEADER: "true"
      OAUTH2_PROXY_PROXY_WEBSOCKETS: "true"

      # Redirect URL
      OAUTH2_PROXY_REDIRECT_URL: "https://schedule.matter.toronto.edu/oauth2/callback"

      # Go straight to Slack login
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"

      # Skip OIDC issuer verification (Slack's discovery endpoint is non-standard)
      OAUTH2_PROXY_INSECURE_OIDC_SKIP_ISSUER_VERIFICATION: "true"
      OAUTH2_PROXY_SKIP_OIDC_DISCOVERY: "true"
    depends_on:
      - schedule
    restart: unless-stopped
